<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Countdown</title>
    <!-- Import Premium Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Deep Space Gradient */
            background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }

        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }



        /* Mobile-First & Premium Polish */
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: float 6s ease-in-out infinite;
            width: 90%;
            max-width: 800px;
            /* Limit max width for better desktop view */
            position: relative;
            z-index: 10;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            /* Responsive font size */
            /* Responsive font size */
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 10px rgba(255, 215, 0, 0.8);
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .countdown {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            justify-content: center;
            flex-wrap: wrap;
            /* Allow wrapping on very small screens */
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 20px;
            min-width: 100px;
            flex: 1;
            /* Distribute space evenly */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Shine effect on hover */
        .time-box::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg) translateY(-100%);
            transition: 0.5s;
        }

        .time-box:hover::after {
            transform: rotate(45deg) translateY(0);
        }

        .time-box:hover {
            transform: translateY(-5px) scale(1.05);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .time-val {
            font-size: clamp(2rem, 4vw, 3.5rem);
            /* Responsive font size */
            font-weight: 700;
            font-family: 'Cinzel', serif;
            background: linear-gradient(to bottom, #fff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        .time-label {
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
        }

        .open-btn {
            padding: 18px 60px;
            font-size: 1.4rem;
            font-family: 'Cinzel', serif;
            color: white;
            background: linear-gradient(45deg, #FF416C, #FF4B2B);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.5s;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(255, 75, 43, 0.4);
            text-decoration: none;
            display: inline-block;
            position: relative;
            z-index: 1;
            overflow: hidden;
            white-space: nowrap;
            /* Prevent text wrapping */
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(255, 75, 43, 0.6);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
                /* Less padding on mobile */
                width: 95%;
            }

            h1 {
                margin-bottom: 25px;
            }

            .countdown {
                gap: 15px;
                margin-bottom: 30px;
            }

            .time-box {
                min-width: 60px;
                /* Allow smaller cards */
                padding: 10px 5px;
            }

            .open-btn {
                padding: 15px 40px;
                font-size: 1.1rem;
                width: 80%;
                /* Wider button target on mobile */
            }
        }

        /* Small mobile devices */
        @media (max-width: 380px) {
            .time-box {
                min-width: 50px;
            }
        }
    </style>
</head>

<body>

    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <h1>Birthday Countdown</h1>
        <div class="countdown">
            <div class="time-box">
                <span class="time-val" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-box">
                <span class="time-val" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-box">
                <span class="time-val" id="minutes">00</span>
                <span class="time-label">Min</span>
            </div>
            <div class="time-box">
                <span class="time-val" id="seconds">00</span>
                <span class="time-label">Sec</span>
            </div>
        </div>

        <a href="index.html" class="open-btn">Open</a>
    </div>

    <script>
        // --- BACKGROUND HEARTS ANIMATION ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Heart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 10 + 5;
                this.speed = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.wobble = Math.random() * Math.PI * 2;
            }

            update() {
                this.y -= this.speed;
                this.wobble += 0.05;
                this.x += Math.sin(this.wobble) * 0.5;

                if (this.y < -50) {
                    this.y = canvas.height + 50;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 105, 180, ${this.opacity})`;
                ctx.font = `${this.size}px serif`;
                ctx.fillText('❤', this.x, this.y);
            }
        }

        for (let i = 0; i < 40; i++) {
            hearts.push(new Heart());
        }

        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(h => {
                h.update();
                h.draw();
            });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // --- AUTOMATIC COUNTDOWN LOGIC ---
        // TARGET DATE: 17th March 2026
        // Month is 0-indexed (0=Jan, 1=Feb, 2=Mar), but passing date string handles it automatically.
        const targetDate = new Date("2026-03-17 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // If time is up
            if (distance < 0) {
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                document.querySelector("h1").innerText = "Happy Birthday!";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>

</html>
