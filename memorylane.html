  <title>Memory Lane - 3D Journey</title>
  <!-- Premium Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
  <style>
    :root {
      --card-width: 320px;
      --card-height: 480px;
      --gap: 40px;
    }

    @media (max-width: 768px) {
      :root {
        --card-width: 70vw;
        --card-height: 55vh;
        --gap: 20px;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: #000;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* Deep Space Gradient */
      background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
      color: white;
    }

    #bgCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Header */
    .header {
      position: absolute;
      top: 10px;
      /* Move header up slightly */
      width: 100%;
      padding: 0 20px;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    .header h1 {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      letter-spacing: 6px;
      background: linear-gradient(to right, #ffffff, #ffb6c1, #ffd700);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Navigation */
    .nav-controls {
      position: absolute;
      bottom: 40px;
      display: flex;
      gap: 30px;
      z-index: 100;
    }

    .nav-btn {
      padding: 14px 35px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
      text-decoration: none;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: #ffd700;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
      transform: translateY(-5px);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2rem;
      }

      .nav-controls {
        bottom: 30px;
        gap: 15px;
        width: 90%;
        justify-content: center;
      }

      .nav-btn {
        padding: 12px 25px;
        font-size: 0.8rem;
      }
    }

    /* 3D Gallery */
    .gallery-container {
      position: relative;
      width: 100%;
      height: 65vh;
      display: flex;
      align-items: center;
      perspective: 1000px;
      /* Essential for 3D */
      overflow: visible;
      z-index: 5;
    }

    .gallery-track {
      display: flex;
      align-items: center;
      gap: var(--gap);
      padding-left: 50vw;
      /* Start with first item centralized (adjust logic in JS) */
      padding-right: 50vw;
      width: fit-content;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .card {
      flex-shrink: 0;
      width: var(--card-width);
      height: var(--card-height);
      border-radius: 20px;
      position: relative;
      transform-style: preserve-3d;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      /* Initial state for lazy load */
      opacity: 0;
      transition: opacity 0.5s ease-out;
    }

    .card.loaded {
      opacity: 1;
    }

    .card-mask {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      transform: translateZ(0);
      /* Fix for Safari overflow */
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      /* Placeholder background */
      background: linear-gradient(45deg, #2a2a2a, #333);
    }

    .card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }


    /* Reflection effect */
    .card::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      width: 100%;
      height: 20px;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.4) 0%, transparent 70%);
      z-index: -1;
      transform: rotateX(90deg) scale(0.8);
      filter: blur(10px);
    }

    .card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px 15px 25px;

      background: linear-gradient(to top, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.6), transparent);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      text-align: center;
    }

    .card:hover .card-content,
    .card.active .card-content {
      transform: translateY(0);
    }

    .card h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      color: #ffd700;
      margin-bottom: 5px;
      line-height: 1.3;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
    }

    .card p {
      font-size: 0.9rem;
      color: #e0e0e0;
      color: #e0e0e0;
      line-height: 1.4;
      padding: 0 10px;
    }

    /* Love Quote Popup */
    .love-quote-popup {
      position: absolute;
      top: -80px;
      /* Move popup higher to avoid hitting header */
      left: 50%;
      transform: translateX(-50%) scale(0.8) translateY(20px);
      background: rgba(255, 105, 180, 0.25);
      /* Slightly darker for better contrast */
      backdrop-filter: blur(15px);
      color: #fff;
      padding: 12px 20px;
      border-radius: 20px;
      font-size: 0.95rem;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(255, 20, 147, 0.3);
      border: 1px solid rgba(255, 105, 180, 0.3);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      z-index: 20;
      min-width: 150px;
      max-width: 200px;
      width: max-content;
      white-space: normal;
      text-align: center;
      line-height: 1.4;
    }

    .card.active .love-quote-popup {
      opacity: 1;
      transform: translateX(-50%) scale(1) translateY(0);
    }

    .love-quote-popup::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 10px 10px 0;
      border-style: solid;
      border-color: rgba(255, 105, 180, 0.15) transparent transparent transparent;
    }

    .hint {
      position: absolute;
      bottom: 110px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      animation: pulse 2s infinite;
      pointer-events: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.4;
        transform: scale(1);
      }

      50% {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }
  </style>
</head>

    const track = document.getElementById('track');

    // --- LAZY LOADING OBSERVER ---
    const imageObserver = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const src = el.getAttribute('data-src');
          if (src) {
            el.src = src;
            el.removeAttribute('data-src');
          }
          el.closest('.card').classList.add('loaded'); // Fade in triggered in CSS
          observer.unobserve(el);
        }
      });
    }, {
      root: null,
      rootMargin: '200px', // Load before it comes into view
      threshold: 0.1
    });

    // --- RENDER CARDS ---
    memories.forEach((mem, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      // Use data-src for lazy loading
      // Create content based on type (image or video)
      let mediaContent = '';
      if (mem.img.toLowerCase().endsWith('.mp4')) {
        mediaContent = `<video src="${mem.img}" loop muted playsinline></video>`;
      } else {
        mediaContent = `<img data-src="${mem.img}" src="" alt="${mem.title}" loading="lazy">`;
      }

      card.innerHTML = `
        <div class="card-mask">
          ${mediaContent}
          <div class="card-content">
            <p>${mem.desc}</p>
          </div>
        </div>
        <div class="love-quote-popup">${mem.quote}</div>
            `;
      track.appendChild(card);

      // Observe the media element (img or video)
      const mediaElement = card.querySelector('img') || card.querySelector('video');
      if (mediaElement) {
        imageObserver.observe(mediaElement);
      }
    });

    // --- GSAP DRAGGABLE & 3D LOGIC ---
    gsap.registerPlugin(Draggable);

    let draggableInstance;
    let cardWidth, gap, totalWidth;

    function updateDimensions() {
      const cards = document.querySelectorAll('.card');
      if (cards.length === 0) return;
      cardWidth = cards[0].offsetWidth;
      const gapStyle = getComputedStyle(document.documentElement).getPropertyValue('--gap').trim();
      gap = parseInt(gapStyle) || 20;
    }

    function initDraggable() {
      if (draggableInstance && draggableInstance[0]) draggableInstance[0].kill();
      updateDimensions();

      const lastCardX = -((cardWidth + gap) * (memories.length - 1));

      draggableInstance = Draggable.create("#track", {
        type: "x",
        inertia: true,
        edgeResistance: 0.7,
        dragResistance: 0.0,
        bounds: {
          minX: lastCardX,
          maxX: 0 // Start point
        },
        onDrag: update3D,
        onThrowUpdate: update3D,
        zIndexBoost: false,
        // Increase throw resistance to allow it to glide further
        throwResistance: 2000,
        maxDuration: 2
      });

      update3D();
    }

    // --- KEYBOARD NAVIGATION ---
    window.addEventListener('keydown', (e) => {
      if (!draggableInstance || !draggableInstance[0]) return;

      const speedX = cardWidth + gap; // Move by one card width
      const track = document.getElementById('track');
      let currentX = gsap.getProperty(track, "x");

      const lastCardX = -((cardWidth + gap) * (memories.length - 1));

      if (e.key === 'ArrowRight') {
        let newX = currentX - speedX;
        if (newX < lastCardX) newX = lastCardX; // Bound check

        gsap.to(track, {
          x: newX,
          duration: 0.4,
          ease: "power2.out",
          onUpdate: update3D
        });
      } else if (e.key === 'ArrowLeft') {
        let newX = currentX + speedX;
        if (newX > 0) newX = 0; // Bound check

        gsap.to(track, {
          x: newX,
          duration: 0.4,
          ease: "power2.out",
          onUpdate: update3D
        });
      }
    });

    function update3D() {
      const center = window.innerWidth / 2;
      const cards = document.querySelectorAll('.card');
      const trackX = gsap.getProperty("#track", "x");

      // We need to calculate the absolute position of each card relative to the viewport
      // Track starts at 50vw (from padding).
      // So Card[i] position = trackX + 50vw + (i * (cardWidth + gap))
      // But we want center of card.

      const startOffset = window.innerWidth / 2; // Because padding-left: 50vw

      cards.forEach((card, i) => {
        const cardX = startOffset + trackX + (i * (cardWidth + gap));
        const cardCenter = cardX + (cardWidth / 2);
        const dist = cardCenter - center;

        // --- 3D TRANSFORM ---
        const distNorm = dist / window.innerWidth; // Normalized distance (-0.5 to 0.5 roughly)

        // Rotation: rotate slightly away from center
        let rotateY = distNorm * 45;

        // Clamp rotation
        if (rotateY > 60) rotateY = 60;
        if (rotateY < -60) rotateY = -60;

        // Scale and Z-index
        // Closer to center = larger and higher z-index
        const absDist = Math.abs(dist);
        let scale = 1 - (absDist / 1000);
        scale = Math.max(0.7, scale); // Min scale

        let opacity = 1 - (absDist / 1500);
        opacity = Math.max(0.5, opacity);

        // Active state
        if (absDist < cardWidth / 1.5) {
          card.classList.add('active');
          gsap.to(card, {
            scale: 1.1,
            rotationY: 0,
            z: 100,
            opacity: 1,
            duration: 0.1,
            overwrite: 'auto'
          });
          // Play video if it's a video card
          const video = card.querySelector('video');
          if (video && video.paused) video.play();
        } else {
          card.classList.remove('active');
          gsap.to(card, {
            scale: scale,
            rotationY: rotateY,
            z: -absDist / 2,
            opacity: opacity,
            duration: 0.1,
            overwrite: 'auto'
          });
        }
      });
    }

    window.addEventListener('load', initDraggable);
    window.addEventListener('resize', () => { setTimeout(initDraggable, 100); });

    // --- BACKGROUND HEARTS ANIMATION ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let hearts = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Heart {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = Math.random() * 10 + 5;
        this.speed = Math.random() * 1 + 0.5;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.wobble = Math.random() * Math.PI * 2;
      }

      update() {
        this.y -= this.speed;
        this.wobble += 0.05;
        this.x += Math.sin(this.wobble) * 0.5;

        if (this.y < -50) {
          this.y = canvas.height + 50;
          this.x = Math.random() * canvas.width;
        }
      }

      draw() {
        ctx.fillStyle = `rgba(255, 105, 180, ${this.opacity})`;
        ctx.font = `${this.size}px serif`;
        ctx.fillText('❤', this.x, this.y);
      }
    }

    for (let i = 0; i < 50; i++) {
      hearts.push(new Heart());
    }

    function animateBg() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hearts.forEach(h => {
        h.update();
        h.draw();
      });
      requestAnimationFrame(animateBg);
    }
    animateBg();

  </script>
