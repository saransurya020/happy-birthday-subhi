<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Heart For You 💖</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 
       * MAGICAL GLASS THEME
       * "Ethereal Beauty"
       */

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            min-height: 100vh;
            /* Deep Space Gradient */
            background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            perspective: 1000px;
        }

        /* Floating Particles */
        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* THE ENVELOPE (Glass & Gold) */
        .envelope-wrapper {
            position: relative;
            width: 350px;
            height: 240px;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.5s;
        }

        .envelope-wrapper:hover {
            transform: scale(1.05) translateY(-10px);
        }

        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2), 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Gold Lines Decoration */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 215, 0, 0.3);
            margin: 5px;
            border-radius: 8px;
        }

        /* The "V" Shape of Envelope */
        .flap-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 175px solid transparent;
            border-right: 175px solid transparent;
            border-top: 120px solid rgba(255, 215, 0, 0.1);
            /* Slight tint */
            z-index: 5;
            pointer-events: none;
        }

        .flap-border {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 175px solid transparent;
            border-right: 175px solid transparent;
            border-top: 120px solid transparent;
            /* We use a pseudo-element border trick effectively or simpler: SVG? 
          Let's use a nice Heart Seal instead of complex CSS flaps to keep it "Glassy"
       */
        }

        /* HEART SEAL - The Interaction Point */
        .heart-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #ff69b4;
            text-shadow: 0 0 20px #ff1493;
            z-index: 20;
            animation: beat 1.5s infinite;
            cursor: pointer;
            transition: 0.5s;
        }

        @keyframes beat {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                text-shadow: 0 0 40px #ff1493;
            }
        }

        .hint-text {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            font-family: 'Cinzel', serif;
            color: #ffd700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ffd700;
            animation: fadeIn 2s infinite alternate;
            pointer-events: none;
        }

        /* THE LETTER (Hidden inside) */
        .letter-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0) rotate(-10deg);
            width: 80%;
            max-width: 600px;
            min-height: 350px;
            background: rgba(20, 10, 30, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 100px rgba(255, 105, 180, 0.3);
            z-index: 100;
            opacity: 0;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .letter-card.active {
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
            opacity: 1;
        }

        .letter-card h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            background: linear-gradient(to right, #ffd700, #ff69b4);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .text-area {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #eee;
            line-height: 1.8;
            line-height: 1.8;
            height: 200px;
            overflow-y: auto;
            width: 100%;
            margin-bottom: 30px;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 215, 0, 0.5) rgba(0, 0, 0, 0.1);
        }

        /* Buttons */
        .btn {
            padding: 12px 35px;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 20, 147, 0.4);
            transition: all 0.3s;
            margin: 10px;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #ffd700;
            color: #ffd700;
            box-shadow: none;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.6);
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: white;
        }



        @keyframes slideInUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Floating Music Button */
        .music-btn-floating {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            z-index: 200;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideInUp 1s ease forwards;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .music-btn-floating:hover {
            background: linear-gradient(90deg, #ff69b4, #ffd700);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            transform: translateY(-5px);
        }

        /* Floating Previous Button */
        .prev-btn-floating {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            z-index: 200;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideInUp 1s ease forwards;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .prev-btn-floating:hover {
            background: linear-gradient(90deg, #ff69b4, #ffd700);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            transform: translateY(-5px);
        }

        /* Mobile Responsiveness */
        @media (max-width: 500px) {
            .envelope-wrapper {
                width: 280px;
                /* Scale down naturally */
                height: 190px;
            }

            .envelope-wrapper:hover {
                transform: scale(1.02) translateY(-5px);
                /* Reduce hover effect on touch */
            }

            .music-btn-floating,
            .prev-btn-floating {
                bottom: 20px;
                padding: 10px 15px;
                font-size: 0.8rem;
            }

            .music-btn-floating {
                right: 15px;
            }

            .prev-btn-floating {
                left: 15px;
            }

            .letter-card {
                width: 90%;
                padding: 20px;
            }

            .letter-card h2 {
                font-size: 2.5rem;
            }

            .text-area {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Magic Particles -->
    <canvas id="bgCanvas"></canvas>

    <!-- The Envelope Stage -->
    <div class="envelope-wrapper" onclick="openLetter()">
        <div class="envelope">
            <div class="flap-mask"></div>
            <div class="heart-seal">💖</div>
        </div>
        <div class="hint-text">TOUCH THE HEART</div>
    </div>

    <!-- The Letter Popup -->
    <div class="letter-card" id="letter">
        <div class="close-btn" onclick="closeLetter()">×</div>
        <h2>My Everything...</h2>
        <div class="text-area" id="typed-text"></div>

        <div
            style="opacity: 0; animation: fadeIn 1s forwards 3s; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <button class="btn btn-secondary" onclick="location.href='cake.html'">← Previous Surprise</button>
            <button class="btn" onclick="location.href='music.html'">Musical Journey →</button>
        </div>
    </div>

    <!-- Magical Audio Controls -->


    <!-- Floating Music Button -->
    <button class="music-btn-floating" onclick="location.href='music.html'">
        <i class="fas fa-music"></i> Music
    </button>

    <!-- Floating Previous Button -->
    <button class="prev-btn-floating" onclick="location.href='cake.html'">
        <i class="fas fa-arrow-left"></i> Previous
    </button>



    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // --- BACKGROUND HEARTS ANIMATION ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Heart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 10 + 5;
                this.speed = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.wobble = Math.random() * Math.PI * 2;
            }

            update() {
                this.y -= this.speed;
                this.wobble += 0.05;
                this.x += Math.sin(this.wobble) * 0.5;

                if (this.y < -50) {
                    this.y = canvas.height + 50;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 105, 180, ${this.opacity})`;
                ctx.font = `${this.size}px serif`;
                ctx.fillText('❤', this.x, this.y);
            }
        }

        for (let i = 0; i < 40; i++) {
            hearts.push(new Heart());
        }

        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(h => {
                h.update();
                h.draw();
            });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // --- ANIMATION ---
        const message = `Every moment with you is magic.^500\n\nYou are my sun, my moon, and all my stars.^500\n\nHappy Birthday, My Angel! ❤️`;
        let isTyped = false;

        function openLetter() {
            const letter = document.getElementById('letter');
            const env = document.querySelector('.envelope-wrapper');

            // Hide Envelope
            gsap.to(env, { scale: 0, opacity: 0, duration: 0.5 });

            // Show Letter
            letter.classList.add('active');

            // Explosion
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#ffd700', '#ff69b4'] });

            // Type Text
            if (!isTyped) {
                setTimeout(() => {
                    new Typed('#typed-text', {
                        strings: [message],
                        typeSpeed: 40,
                        showCursor: false
                    });
                    isTyped = true;
                }, 800);
            }
        }

        function closeLetter() {
            const letter = document.getElementById('letter');
            const env = document.querySelector('.envelope-wrapper');

            letter.classList.remove('active');

            // Show Envelope back
            gsap.to(env, { scale: 1, opacity: 1, duration: 0.5, delay: 0.5 });
        }


    </script>

    <!-- GSAP for Smooth Transforms (loaded via CDN but ensuring fallback) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</body>

</html>
