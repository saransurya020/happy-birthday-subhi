<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Gifts</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            background: rgba(20, 10, 30, 0.85);
            /* Dark Glassy Look */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            max-width: 600px;
            border: 2px solid rgba(254, 76, 131, 0.5);
            /* Glowing Pink Border */
            box-shadow: 0 0 30px rgba(254, 76, 131, 0.2);
            border-radius: 40px;
            padding: 50px 20px 40px;
            text-align: center;
            position: relative;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #ffffff;
            /* White text for contrast */
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(254, 76, 131, 0.5);
        }

        .title span {
            font-size: 2.5rem;
        }

        .gifts-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .gift-card {
            width: 125px;
            height: 175px;
            background: #fdead1;
            background: linear-gradient(to bottom, #ffeaf1, #fee0ea);
            border: 2px solid #fd98b9;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
            position: relative;
        }

        .gift-card:hover,
        .gift-card.playing {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(254, 76, 131, 0.2);
            border-color: #fe4c83;
        }

        .gift-card.playing {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(254, 76, 131, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(254, 76, 131, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(254, 76, 131, 0);
            }
        }

        .gift-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #7c2242;
            font-size: 1.2rem;
        }

        .gift-icon {
            font-size: 3rem;
            filter: drop-shadow(0 4px 5px rgba(0, 0, 0, 0.15));
        }

        .song-name {
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
        }

        .back-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .back-btn {
            background-color: transparent;
            color: #fe4c83;
            text-decoration: none;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            line-height: 1.3;
            box-shadow: 0 0 20px rgba(254, 76, 131, 0.3), inset 0 0 15px rgba(254, 76, 131, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid #fe4c83;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(254, 76, 131, 0.6), inset 0 0 20px rgba(254, 76, 131, 0.4);
            background: rgba(254, 76, 131, 0.1);
        }

        /* --- POPUP PLAYER MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .player-modal {
            background: rgba(20, 10, 30, 0.85);
            border: 2px solid rgba(254, 76, 131, 0.5);
            box-shadow: 0 0 50px rgba(254, 76, 131, 0.3);
            border-radius: 30px;
            width: 90%;
            max-width: 450px;
            padding: 40px 20px;
            position: relative;
            transform: translateY(50px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .modal-overlay.active .player-modal {
            transform: translateY(0) scale(1);
        }

        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-modal-btn:hover {
            color: #fe4c83;
        }

        /* Floating Vinyl Effect */
        .vinyl-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .vinyl-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #1a1a1a, #333, #1a1a1a, #333, #1a1a1a);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 0 5px rgba(30, 30, 30, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
            position: relative;
            transition: box-shadow 0.3s ease;
        }

        .vinyl-disc::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: repeating-radial-gradient(transparent 0, transparent 4px, rgba(255, 255, 255, 0.03) 5px);
        }

        .vinyl-disc.playing {
            animation-play-state: running;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 0 4px rgba(254, 76, 131, 0.6), 0 0 50px rgba(254, 76, 131, 0.3);
        }

        .album-center {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: url('https://source.unsplash.com/random/300x300/?love,music') center/cover;
            border: 4px solid #1a1a1a;
            position: relative;
            z-index: 2;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .player-info {
            margin-bottom: 25px;
        }

        .player-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(254, 76, 131, 0.5);
        }

        .player-artist {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .play-btn {
            width: 65px;
            height: 65px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fe4c83, #9b2add);
            border: none;
            box-shadow: 0 10px 20px rgba(254, 76, 131, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 15px 30px rgba(254, 76, 131, 0.6);
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.4rem;
            }

            .title span {
                font-size: 1.6rem;
            }

            .main-container {
                border-width: 4px;
                padding: 30px 10px;
            }

            .gift-card {
                width: 95px;
                height: 140px;
                padding: 15px 5px;
            }

            .gift-icon {
                font-size: 2.2rem;
            }

            .gift-name {
                font-size: 1rem;
            }

            .song-name {
                font-size: 0.75rem;
            }

            .back-btn {
                width: 75px;
                height: 75px;
                font-size: 0.75rem;
            }

            .row {
                gap: 10px;
            }

            .vinyl-wrapper {
                width: 150px;
                height: 150px;
            }

            .album-center {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>

<body>

    <div class="main-container">
        <h1 class="title"><span>💖</span> Your Valentine Gifts <span>💖</span></h1>

        <div class="gifts-grid">
            <div class="row">
                <div class="gift-card" onclick="openPlayer(0)">
                    <div class="gift-name">Gift 1</div>
                    <div class="gift-icon">🎁</div>
                    <div class="song-name">My Songs</div>
                </div>
                <div class="gift-card" onclick="window.location.href='questions.html'">
                    <div class="gift-name">Gift 2</div>
                    <div class="gift-icon">🎁</div>
                    <div class="song-name">Questions</div>
                </div>
                <div class="gift-card" onclick="alert('Surprise coming soon!')">
                    <div class="gift-name">Gift 3</div>
                    <div class="gift-icon">🎁</div>
                    <div class="song-name">Mystery</div>
                </div>
            </div>
            <div class="row">
                <div class="gift-card" onclick="alert('Surprise coming soon!')">
                    <div class="gift-name">Gift 4</div>
                    <div class="gift-icon">🎁</div>
                    <div class="song-name">Mystery</div>
                </div>
                <div class="gift-card" onclick="alert('Surprise coming soon!')">
                    <div class="gift-name">Gift 5</div>
                    <div class="gift-icon">🎁</div>
                    <div class="song-name">Mystery</div>
                </div>
            </div>
        </div>

        <div class="back-btn-container">
            <a href="letter.html" class="back-btn">
                <span>BACK</span>
                <span>TO</span>
                <span>LOVE</span>
            </a>
        </div>
    </div>

    <!-- The Player Modal -->
    <div class="modal-overlay" id="playerModal">
        <div class="player-modal">
            <div class="close-modal-btn" onclick="closePlayer()">&times;</div>

            <div class="vinyl-wrapper">
                <div class="vinyl-disc" id="vinylDisc">
                    <div class="album-center"></div>
                </div>
            </div>

            <div class="player-info">
                <div class="player-title" id="modalTitle">Song Title</div>
                <div class="player-artist" id="modalArtist">Musical Journey</div>
            </div>

            <div class="player-controls">
                <button class="ctrl-btn" onclick="prevSong()"><i class="fas fa-step-backward"></i></button>
                <button class="ctrl-btn play-btn" onclick="togglePlay()" id="playBtn"><i
                        class="fas fa-play"></i></button>
                <button class="ctrl-btn" onclick="nextSong()"><i class="fas fa-step-forward"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const songData = [
            { src: "./song1.mp3", title: "Song 1", artist: "Gift 1" },
            { src: "./song2.mp3", title: "Song 2", artist: "Gift 2" },
            { src: "./song3.mp3", title: "Song 3", artist: "Gift 3" },
            { src: "./song1.mp3", title: "Song 4", artist: "Gift 4" },
            { src: "./song1.mp3", title: "Song 5", artist: "Gift 5" }
        ];

        const audioPlayer = document.getElementById('audio-player');
        const modalOverlay = document.getElementById('playerModal');
        const vinylDisc = document.getElementById('vinylDisc');
        const playBtn = document.getElementById('playBtn');
        const modalTitle = document.getElementById('modalTitle');
        const modalArtist = document.getElementById('modalArtist');
        const giftCards = document.querySelectorAll('.gift-card');

        let currentIndex = -1;
        let isPlaying = false;

        function openPlayer(index) {
            modalOverlay.classList.add('active');

            if (currentIndex !== index) {
                currentIndex = index;
                loadSongContext(index);
                playSong();
            }
        }

        function closePlayer() {
            modalOverlay.classList.remove('active');
        }

        function loadSongContext(index) {
            audioPlayer.src = songData[index].src || songData[0].src;
            modalTitle.innerText = songData[index].title;
            modalArtist.innerText = songData[index].artist;
        }

        function togglePlay() {
            if (audioPlayer.paused) {
                playSong();
            } else {
                pauseSong();
            }
        }

        function playSong() {
            audioPlayer.play().catch(e => console.error("Play error:", e));
            isPlaying = true;
            updatePlayUI();
        }

        function pauseSong() {
            audioPlayer.pause();
            isPlaying = false;
            updatePlayUI();
        }

        function prevSong() {
            let nextIdx = currentIndex - 1;
            if (nextIdx < 0) nextIdx = songData.length - 1;
            currentIndex = nextIdx;
            loadSongContext(currentIndex);
            playSong();
        }

        function nextSong() {
            let nextIdx = currentIndex + 1;
            if (nextIdx >= songData.length) nextIdx = 0;
            currentIndex = nextIdx;
            loadSongContext(currentIndex);
            playSong();
        }

        function updatePlayUI() {
            if (isPlaying) {
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                vinylDisc.classList.add('playing');
            } else {
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                vinylDisc.classList.remove('playing');
            }

            // Pulse gift cards in background
            giftCards.forEach((card, idx) => {
                if (idx === currentIndex && isPlaying) {
                    card.classList.add('playing');
                } else {
                    card.classList.remove('playing');
                }
            });
        }

        audioPlayer.addEventListener('ended', () => {
            nextSong();
        });

        audioPlayer.addEventListener('pause', () => {
            isPlaying = false;
            updatePlayUI();
        });

        audioPlayer.addEventListener('play', () => {
            isPlaying = true;
            updatePlayUI();
        });
    </script>
</body>

</html>
