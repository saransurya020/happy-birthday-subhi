<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Magical Wish ✨</title>
  <!-- Premium Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Poppins:wght@300;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    /* 
       * MAGICAL ROSE GOLD THEME
       * "The Most Beautiful Design"
       */

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: 100vh;
      /* Deep Space Gradient */
      background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
      display: flex;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      position: relative;
    }

    #bgCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* HEADER */
    .header {
      position: absolute;
      top: 10%;
      z-index: 20;
      text-align: center;
      animation: fadeInDown 2s ease-out;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      background: linear-gradient(to right, #fff, #ffd700);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.2rem;
      margin-top: 10px;
    }

    /* THE CAKE CONTAINER */
    .cake-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin-top: 50px;
      z-index: 10;
      transform-style: preserve-3d;
      perspective: 1000px;
      animation: floatCake 4s ease-in-out infinite alternate;
    }

    @keyframes floatCake {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-20px);
      }
    }

    /* PLATE */
    .plate {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%) rotateX(70deg);
      width: 320px;
      height: 320px;
      background: radial-gradient(#fff, #f0f0f0);
      border-radius: 50%;
      box-shadow: 0 10px 0 #ccc, 0 20px 50px rgba(0, 0, 0, 0.5);
      border: 5px solid #ffd700;
      /* Gold Rim */
    }

    /* CAKE LAYERS - Pure CSS 3D Effect */
    .layer {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 100px;
      border-radius: 50%;
      background: #ffc0cb;
      /* Pink Base */
    }

    /* Base Layer */
    .layer-bottom {
      bottom: 0;
      width: 260px;
      height: 80px;
      background: #6d4c41;
      /* Chocolate */
      box-shadow: 0 5px 0 #5d4037, 0 10px 0 #4e342e, 0 15px 0 #3e2723, 0 20px 0 #3e2723,
        inset 0 10px 20px rgba(0, 0, 0, 0.2);
      z-index: 1;
    }

    /* Middle Layer */
    .layer-middle {
      bottom: 35px;
      width: 220px;
      height: 70px;
      background: #f8bbd0;
      /* Soft Pink */
      box-shadow: 0 5px 0 #f48fb1, 0 10px 0 #f06292, 0 15px 0 #e91e63,
        inset 0 5px 10px rgba(255, 255, 255, 0.2);
      z-index: 2;
    }

    /* Top Layer */
    .layer-top {
      bottom: 70px;
      width: 180px;
      height: 60px;
      background: #ffebee;
      /* Cream */
      box-shadow: 0 4px 0 #ffcdd2, 0 8px 0 #ef9a9a, 0 12px 0 #e57373,
        inset 0 5px 15px rgba(255, 255, 255, 0.5);
      z-index: 3;
    }

    /* FROSTING DRIPS */
    .frosting {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(to bottom, #fff 40%, rgba(255, 255, 255, 0) 100%);
      border-radius: 50%;
      z-index: 4;
    }

    /* CANDLES */
    .candles {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 10;
    }

    .candle {
      position: relative;
      width: 12px;
      height: 40px;
      background: repeating-linear-gradient(45deg, #ffd700, #ffd700 2px, #fff 2px, #fff 4px);
      border-radius: 4px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .candle:hover {
      transform: scale(1.1);
    }

    /* Variable Candle Heights for Natural Look */
    .candle:nth-child(2) {
      height: 45px;
      margin-top: -5px;
    }

    .candle:nth-child(3) {
      height: 50px;
      margin-top: -10px;
    }

    .candle:nth-child(4) {
      height: 45px;
      margin-top: -5px;
    }

    /* FLAME */
    .flame {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 25px;
      border-radius: 50% 50% 20% 20%;
      background: radial-gradient(white, yellow, #ff4500);
      filter: blur(1px);
      box-shadow: 0 0 10px #ff4500, 0 0 20px #ff4500, 0 0 40px #ffd700;
      animation: flicker 0.1s infinite alternate;
    }

    @keyframes flicker {
      0% {
        transform: translateX(-50%) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateX(-50%) scale(0.9) rotate(2deg);
        opacity: 0.8;
      }
    }

    .flame.out {
      display: none;
    }

    /* SMOKE */
    .smoke {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 10px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      opacity: 0;
    }

    .smoke.rise {
      animation: smokeUp 1.5s forwards;
    }

    @keyframes smokeUp {
      0% {
        opacity: 0.6;
        transform: translateX(-50%) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-50px) scale(3);
      }
    }

    /* CONTROLS */
    .controls {
      position: fixed;
      bottom: 40px;
      display: flex;
      gap: 20px;
      z-index: 50;
    }

    .btn {
      padding: 12px 30px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }

    .btn:hover {
      background: linear-gradient(90deg, #ff69b4, #ffd700);
      border-color: transparent;
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
      transform: translateY(-3px);
    }

    /* Mobile Responsiveness */
    @media (max-width: 450px) {
      .cake-container {
        transform: scale(0.7);
        /* Scale down for mobile */
        margin-top: 20px;
      }

      .controls {
        bottom: 20px;
        gap: 10px;
        width: 100%;
        justify-content: center;
      }

      .btn {
        padding: 10px 20px;
        font-size: 0.8rem;
      }

      h1 {
        font-size: 2rem;
      }
    }

    /* WISH MODAL */
    .wish-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: 1s;
      z-index: 100;
    }

    .wish-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .card {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 50px;
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      text-align: center;
      box-shadow: 0 0 50px rgba(255, 105, 180, 0.2);
    }

    .card h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 3.5rem;
      background: linear-gradient(to right, #ffd700, #ff1493);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    .card p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

  <!-- Magic Particles -->
  <canvas id="bgCanvas"></canvas>

  <div class="header">
    <h1>Happy Birthday!</h1>
    <p>Blow out the candles to make a wish... ✨</p>
  </div>

  <div class="cake-container">
    <div class="plate"></div>

    <!-- Layers -->
    <div class="layer layer-bottom"></div>
    <div class="layer layer-middle"></div>
    <div class="layer layer-top">
      <div class="frosting"></div>
    </div>

    <!-- Candles -->
    <div class="candles">
      <div class="candle" onclick="blow(this)">
        <div class="flame"></div>
        <div class="smoke"></div>
      </div>
      <div class="candle" onclick="blow(this)">
        <div class="flame"></div>
        <div class="smoke"></div>
      </div>
      <div class="candle" onclick="blow(this)">
        <div class="flame"></div>
        <div class="smoke"></div>
      </div>
      <div class="candle" onclick="blow(this)">
        <div class="flame"></div>
        <div class="smoke"></div>
      </div>
      <div class="candle" onclick="blow(this)">
        <div class="flame"></div>
        <div class="smoke"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="location.href='memorylane.html'">Back</button>
    <button class="btn" onclick="location.href='letter.html'">Next Surprise →</button>
  </div>

  <div class="wish-modal" id="wishModal">
    <div class="card">
      <h2>Dreams Come True!</h2>
      <p>Wishing you a year filled with magic, love, and endless joy! 💖</p>
      <p>I LOVE YOU Subhi💖</p>
      <button class="btn" onclick="closeModal()">Thank You! ✨</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script>
    // --- BACKGROUND HEARTS ANIMATION ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let hearts = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Heart {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = Math.random() * 10 + 5;
        this.speed = Math.random() * 1 + 0.5;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.wobble = Math.random() * Math.PI * 2;
      }

      update() {
        this.y -= this.speed;
        this.wobble += 0.05;
        this.x += Math.sin(this.wobble) * 0.5;

        if (this.y < -50) {
          this.y = canvas.height + 50;
          this.x = Math.random() * canvas.width;
        }
      }

      draw() {
        ctx.fillStyle = `rgba(255, 105, 180, ${this.opacity})`;
        ctx.font = `${this.size}px serif`;
        ctx.fillText('❤', this.x, this.y);
      }
    }

    for (let i = 0; i < 40; i++) {
      hearts.push(new Heart());
    }

    function animateBg() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hearts.forEach(h => {
        h.update();
        h.draw();
      });
      requestAnimationFrame(animateBg);
    }
    animateBg();

    // --- CANDLE LOGIC ---
    let blown = 0;
    const total = 5;

    function blow(candle) {
      const flame = candle.querySelector('.flame');
      const smoke = candle.querySelector('.smoke');

      if (flame && !flame.classList.contains('out')) {
        flame.classList.add('out');
        smoke.classList.add('rise');
        blown++;

        if (blown === total) {
          setTimeout(celebrate, 800);
        }
      }
    }

    function celebrate() {
      document.getElementById('wishModal').classList.add('active');

      const duration = 5000;
      const end = Date.now() + duration;

      (function frame() {
        const timeLeft = end - Date.now();
        if (timeLeft <= 0) return;

        confetti({
          particleCount: 5,
          startVelocity: 30,
          spread: 360,
          origin: { x: Math.random(), y: Math.random() - 0.2 },
          colors: ['#ff0055', '#ffd700', '#ff69b4']
        });

        requestAnimationFrame(frame);
      }());
    }

    function closeModal() {
      document.getElementById('wishModal').classList.remove('active');
    }
  </script>
</body>

</html>
